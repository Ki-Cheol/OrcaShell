<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="520" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">k3s vs kind: Architecture Comparison</text>

  <!-- ===== LEFT: k3s ===== -->
  <!-- Host box -->
  <rect x="40" y="70" width="380" height="400" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="2"/>
  <text x="230" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">Host (DGX Spark)</text>
  <text x="230" y="112" text-anchor="middle" font-size="11" fill="#555">nvidia-container-toolkit ✓</text>

  <!-- Docker container (normal) -->
  <rect x="65" y="125" width="330" height="320" rx="8" fill="#fff3e0" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="230" y="147" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Docker Container</text>
  <rect x="155" y="152" width="150" height="22" rx="4" fill="#ffcc80"/>
  <text x="230" y="167" text-anchor="middle" font-size="11" fill="#BF360C">일반 컨테이너 (non-privileged)</text>

  <!-- k3s box -->
  <rect x="90" y="185" width="280" height="230" rx="8" fill="#fce4ec" stroke="#E91E63" stroke-width="2"/>
  <text x="230" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#880E4F">k3s</text>

  <!-- k3s containerd -->
  <rect x="110" y="215" width="240" height="70" rx="6" fill="#f8bbd0" stroke="#C2185B" stroke-width="1.5"/>
  <text x="230" y="235" text-anchor="middle" font-size="12" font-weight="bold" fill="#880E4F">내장 containerd</text>
  <text x="230" y="252" text-anchor="middle" font-size="11" fill="#AD1457">NVIDIA runtime ✗</text>
  <text x="230" y="268" text-anchor="middle" font-size="11" fill="#AD1457">host GPU 접근 불가 ✗</text>

  <!-- sandbox pod -->
  <rect x="130" y="300" width="200" height="90" rx="6" fill="#e1bee7" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="230" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A148C">Sandbox Pod</text>
  <text x="230" y="340" text-anchor="middle" font-size="11" fill="#6A1B9A">AI Agent</text>
  <text x="230" y="358" text-anchor="middle" font-size="11" fill="#6A1B9A">GPU: ✗ (HAMI 불가)</text>
  <text x="230" y="374" text-anchor="middle" font-size="11" fill="#388E3C">보안: ★★★★</text>

  <!-- k3s label -->
  <text x="230" y="460" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">k3s 방식</text>

  <!-- Blocked arrow for GPU -->
  <line x1="230" y1="480" x2="230" y2="495" stroke="#E53935" stroke-width="2"/>
  <text x="230" y="508" text-anchor="middle" font-size="11" fill="#E53935">Device Plugin 설정 복잡</text>

  <!-- ===== RIGHT: kind ===== -->
  <!-- Host box -->
  <rect x="480" y="70" width="380" height="400" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">Host (DGX Spark)</text>
  <text x="670" y="112" text-anchor="middle" font-size="11" fill="#555">nvidia-container-toolkit ✓</text>

  <!-- Docker container (privileged) -->
  <rect x="505" y="125" width="330" height="320" rx="8" fill="#fff3e0" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="670" y="147" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Docker Container</text>
  <rect x="575" y="152" width="190" height="22" rx="4" fill="#ffcc80"/>
  <text x="670" y="167" text-anchor="middle" font-size="11" fill="#BF360C">⚠ privileged 컨테이너</text>

  <!-- kind / k8s box -->
  <rect x="530" y="185" width="280" height="230" rx="8" fill="#e3f2fd" stroke="#1976D2" stroke-width="2"/>
  <text x="670" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">kind (upstream k8s)</text>

  <!-- containerd with nvidia -->
  <rect x="550" y="215" width="240" height="70" rx="6" fill="#bbdefb" stroke="#1565C0" stroke-width="1.5"/>
  <text x="670" y="235" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D47A1">containerd</text>
  <text x="670" y="252" text-anchor="middle" font-size="11" fill="#1565C0">NVIDIA runtime ✓</text>
  <text x="670" y="268" text-anchor="middle" font-size="11" fill="#1565C0">host GPU 접근 가능 ✓</text>

  <!-- sandbox pod -->
  <rect x="570" y="300" width="200" height="90" rx="6" fill="#c8e6c9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="670" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Sandbox Pod</text>
  <text x="670" y="340" text-anchor="middle" font-size="11" fill="#2E7D32">AI Agent</text>
  <text x="670" y="358" text-anchor="middle" font-size="11" fill="#2E7D32">GPU: ✓ (HAMI 가능)</text>
  <text x="670" y="374" text-anchor="middle" font-size="11" fill="#E65100">보안: ★★★</text>

  <!-- kind label -->
  <text x="670" y="460" text-anchor="middle" font-size="15" font-weight="bold" fill="#1B5E20">kind 방식</text>
  <text x="670" y="508" text-anchor="middle" font-size="11" fill="#2E7D32">Device Plugin (HAMI) 동작 ✓</text>

  <!-- VS divider -->
  <line x1="450" y1="80" x2="450" y2="470" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,4"/>
  <rect x="425" y="255" width="50" height="30" rx="15" fill="#455a64"/>
  <text x="450" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="white">VS</text>

</svg>
