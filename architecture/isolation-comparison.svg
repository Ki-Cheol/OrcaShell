<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="'Paperlogy 5 Medium', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">

  <rect width="1000" height="580" fill="#ffffff"/>

  <!-- ===== Title ===== -->
  <text x="500" y="38" text-anchor="middle" font-size="17" font-weight="500" fill="#2c2c2c">K3s OpenShell 방식과 kind(k8s) 방식의 차이점</text>

  <!-- ===== Subtitle bullets ===== -->
  <circle cx="58" cy="56" r="3" fill="#7986cb"/>
  <text x="68" y="60" font-size="11" fill="#546e7a">NemoClaw는 Host와의 격리를 위해 k3s 사용 — k3s 내에서 host 접근 불가</text>
  <circle cx="58" cy="74" r="3" fill="#ef9a9a"/>
  <text x="68" y="78" font-size="11" fill="#546e7a">kind 기반 OpenShell 변경 시 Privileged 컨테이너 기반으로 호스트 커널 접근 가능</text>

  <!-- ================================================================ -->
  <!-- LEFT: k3s -->
  <!-- ================================================================ -->

  <!-- HOST -->
  <rect x="40" y="96" width="420" height="440" rx="10" fill="#f5f7ff" stroke="#c5cae9" stroke-width="1"/>
  <text x="250" y="118" text-anchor="middle" font-size="12" font-weight="500" fill="#5c6bc0">HOST  (DGX Spark)</text>
  <text x="250" y="133" text-anchor="middle" font-size="10" fill="#9fa8da">Linux Kernel  ·  NVIDIA Toolkit  ·  Docker</text>

  <!-- kernel row -->
  <rect x="60" y="140" width="380" height="24" rx="5" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1"/>
  <text x="250" y="156" text-anchor="middle" font-size="10" fill="#7986cb">Linux Kernel  (namespace / cgroups)</text>

  <!-- Docker container normal -->
  <rect x="70" y="174" width="360" height="330" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="250" y="193" text-anchor="middle" font-size="11" font-weight="500" fill="#1976d2">Docker Container</text>
  <rect x="130" y="198" width="240" height="20" rx="4" fill="#bbdefb"/>
  <text x="250" y="212" text-anchor="middle" font-size="10" fill="#1565c0">일반 컨테이너  (non-privileged)</text>

  <!-- WALL -->
  <rect x="70" y="226" width="360" height="16" rx="0" fill="#c8e6c9"/>
  <text x="250" y="237" text-anchor="middle" font-size="9" fill="#2e7d32">🔒  capability 제한 — 호스트 커널 접근 완전 차단</text>

  <!-- k3s -->
  <rect x="90" y="250" width="320" height="230" rx="7" fill="#fce4ec" stroke="#f48fb1" stroke-width="1"/>
  <text x="250" y="268" text-anchor="middle" font-size="11" font-weight="500" fill="#c2185b">k3s</text>

  <!-- containerd -->
  <rect x="108" y="276" width="284" height="62" rx="5" fill="#ffeeff" stroke="#f48fb1" stroke-width="1"/>
  <text x="250" y="293" text-anchor="middle" font-size="10" font-weight="500" fill="#ad1457">내장 containerd</text>
  <text x="250" y="309" text-anchor="middle" font-size="10" fill="#e57373">✗  NVIDIA runtime 없음</text>
  <text x="250" y="324" text-anchor="middle" font-size="10" fill="#e57373">✗  /dev/nvidia* 접근 불가</text>

  <!-- sandbox pod -->
  <rect x="118" y="350" width="264" height="108" rx="5" fill="#ede7f6" stroke="#ce93d8" stroke-width="1"/>
  <text x="250" y="368" text-anchor="middle" font-size="10" font-weight="500" fill="#6a1b9a">Sandbox Pod  (AI Agent)</text>
  <line x1="118" y1="378" x2="382" y2="378" stroke="#ce93d8" stroke-width="0.8"/>
  <text x="250" y="394" text-anchor="middle" font-size="10" fill="#e57373">✗  GPU 사용 불가</text>
  <text x="250" y="412" text-anchor="middle" font-size="10" fill="#66bb6a">✓  Host 커널 접근 불가  (안전)</text>
  <text x="250" y="430" text-anchor="middle" font-size="10" fill="#66bb6a">✓  Host 파일시스템 접근 불가</text>
  <text x="250" y="448" text-anchor="middle" font-size="10" fill="#66bb6a">✓  격리 유지</text>

  <!-- bottom -->
  <text x="250" y="554" text-anchor="middle" font-size="13" font-weight="500" fill="#1976d2">k3s 방식</text>
  <text x="250" y="570" text-anchor="middle" font-size="10" fill="#66bb6a">보안 격리 강함  ★★★★  |  GPU 멀티테넌시 불가</text>

  <!-- ================================================================ -->
  <!-- RIGHT: kind -->
  <!-- ================================================================ -->

  <!-- HOST -->
  <rect x="540" y="96" width="420" height="440" rx="10" fill="#fffaf5" stroke="#ffcc80" stroke-width="1"/>
  <text x="750" y="118" text-anchor="middle" font-size="12" font-weight="500" fill="#f57c00">HOST  (DGX Spark)</text>
  <text x="750" y="133" text-anchor="middle" font-size="10" fill="#ffb74d">Linux Kernel  ·  NVIDIA Toolkit  ·  Docker</text>

  <!-- kernel row -->
  <rect x="560" y="140" width="380" height="24" rx="5" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1"/>
  <text x="750" y="156" text-anchor="middle" font-size="10" fill="#7986cb">Linux Kernel  (namespace / cgroups)</text>

  <!-- arrow: privileged can reach kernel -->
  <line x1="750" y1="174" x2="750" y2="164" stroke="#ef9a9a" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="745,164 755,164 750,158" fill="#ef9a9a"/>

  <!-- Docker container privileged -->
  <rect x="570" y="174" width="360" height="330" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="750" y="193" text-anchor="middle" font-size="11" font-weight="500" fill="#e65100">Docker Container</text>
  <rect x="620" y="198" width="260" height="20" rx="4" fill="#ffe0b2"/>
  <text x="750" y="212" text-anchor="middle" font-size="10" fill="#bf360c">⚠  Privileged 컨테이너</text>

  <!-- BROKEN WALL -->
  <line x1="570" y1="234" x2="670" y2="234" stroke="#ef9a9a" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="750" y="232" font-size="11" fill="#e57373" text-anchor="middle">✗ ✗ ✗</text>
  <line x1="810" y1="234" x2="930" y2="234" stroke="#ef9a9a" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="750" y="246" text-anchor="middle" font-size="9" fill="#ef9a9a">⚠  격리 약함 — 호스트 커널 직접 접근 가능</text>

  <!-- kind k8s -->
  <rect x="590" y="256" width="320" height="224" rx="7" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="750" y="274" text-anchor="middle" font-size="11" font-weight="500" fill="#2e7d32">kind  (upstream k8s)</text>

  <!-- containerd -->
  <rect x="608" y="282" width="284" height="62" rx="5" fill="#f1f8e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="750" y="299" text-anchor="middle" font-size="10" font-weight="500" fill="#388e3c">containerd</text>
  <text x="750" y="315" text-anchor="middle" font-size="10" fill="#66bb6a">✓  NVIDIA runtime 사용 가능</text>
  <text x="750" y="330" text-anchor="middle" font-size="10" fill="#66bb6a">✓  /dev/nvidia* 접근 가능</text>

  <!-- sandbox pod -->
  <rect x="618" y="356" width="264" height="100" rx="5" fill="#f9fbe7" stroke="#dce775" stroke-width="1"/>
  <text x="750" y="374" text-anchor="middle" font-size="10" font-weight="500" fill="#558b2f">Sandbox Pod  (AI Agent)</text>
  <line x1="618" y1="384" x2="882" y2="384" stroke="#dce775" stroke-width="0.8"/>
  <text x="750" y="400" text-anchor="middle" font-size="10" fill="#66bb6a">✓  GPU 사용 가능  (HAMI)</text>
  <text x="750" y="418" text-anchor="middle" font-size="10" fill="#ffb74d">⚠  Host 커널 접근 가능</text>
  <text x="750" y="436" text-anchor="middle" font-size="10" fill="#ffb74d">⚠  보안 격리 약화</text>

  <!-- bottom -->
  <text x="750" y="554" text-anchor="middle" font-size="13" font-weight="500" fill="#f57c00">kind 방식</text>
  <text x="750" y="570" text-anchor="middle" font-size="10" fill="#ffb74d">보안 격리 약함  ★★★  |  GPU 멀티테넌시 가능  ✓</text>

  <!-- ================================================================ -->
  <!-- VS divider -->
  <!-- ================================================================ -->
  <line x1="500" y1="96" x2="500" y2="536" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,4"/>
  <rect x="476" y="290" width="48" height="26" rx="13" fill="#eceff1" stroke="#cfd8dc" stroke-width="1"/>
  <text x="500" y="308" text-anchor="middle" font-size="12" font-weight="500" fill="#546e7a">VS</text>

</svg>
